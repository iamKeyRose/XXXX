
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
header {
    padding-top: var(--tg-safe-area-inset-top); /* Avoids the camera notch */
}

footer {
    padding-bottom: var(--tg-safe-area-inset-bottom); /* Avoids the home bar */
}


<script src="https://telegram.org/js/telegram-web-app.js">

  // Inside your index.html <script> tag
const tg = window.Telegram.WebApp;

// 1. Tell Telegram the app is ready to be shown
tg.ready();

// 2. Expand the app to take up the full screen height
tg.expand();

// 3. (Optional) For 2026 updates: Request true Fullscreen (no status bar)
if (tg.requestFullscreen) {
    tg.requestFullscreen();
}

</script>

<style>
  /* Ensure the app takes exactly 100% of the viewport height */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh; /* Viewport Height */
    overflow-x: hidden; /* Prevent side-scrolling */
    
    /* Native Telegram Background & Text Colors */
    background-color: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
}

#content {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
  
</style>
