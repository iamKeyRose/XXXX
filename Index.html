
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
header {
    padding-top: var(--tg-safe-area-inset-top); /* Avoids the camera notch */
}

footer {
    padding-bottom: var(--tg-safe-area-inset-bottom); /* Avoids the home bar */
}


<script src="https://telegram.org/js/telegram-web-app.js">

  
    const tg = window.Telegram.WebApp;

    // Wait for the app to be fully initialized
    tg.ready();

    // Force expansion with a tiny delay to ensure it catches
    setTimeout(() => {
        tg.expand();
    }, 100);

    // Optional: Log the height to help you debug
    console.log("Current Viewport Height:", tg.viewportHeight);



</script>

<style>
  
    :root {
        --tg-viewport-height: 100dvh; /* Dynamic height */
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        /* Use dvh to ensure it fills exactly the visible area */
        height: 100dvh; 
        min-height: 100dvh;
        overflow: hidden; /* Prevents the 'bouncing' scroll effect */
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #222222);
        display: flex;
        flex-direction: column;
    }

    #app-container {
        flex: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        /* This ensures content stays within the safe area (no notches) */
        padding-top: var(--tg-safe-area-inset-top, 0px);
        padding-bottom: var(--tg-safe-area-inset-bottom, 0px);
    }

</style>
