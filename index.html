<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Habesha Super App</title>

    <style>
        :root {
            --tg-viewport-height: 100dvh;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; 
            min-height: 100dvh;
            overflow: hidden; 
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
        }

        #app-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-top: var(--tg-safe-area-inset-top, 0px);
            padding-bottom: var(--tg-safe-area-inset-bottom, 0px);
        }

        header {
            padding: 15px;
            padding-top: var(--tg-safe-area-inset-top, 15px);
            text-align: center;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        footer {
            padding-bottom: var(--tg-safe-area-inset-bottom, 15px);
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <strong>Habesha Hub</strong>
        </header>

        <main style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <p>App is Loading...</p>
        </main>

        <footer>
            <small>Powered by Telegram</small>
        </footer>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Use a small delay to ensure the container is ready before expanding
        setTimeout(() => {
            tg.expand();
        }, 150);

        // Optional: Change the header color to match the theme
        tg.setHeaderColor('secondary_bg_color');
    </script>
</body>
</html>
